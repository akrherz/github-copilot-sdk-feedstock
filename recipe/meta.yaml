{% set name = "github-copilot-sdk" %}
{% set version = "1.0.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/py3/{{ name[0] }}/{{ name }}/github_copilot_sdk-{{ version }}-py3-none-any.whl
  sha256: 4f4715553dfab863ffdbff250fc245fb484577e2a16c9cbaab3cf43bb69c4ca7

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=45
    - wheel
    - setuptools-scm >=6.2
    - pip
  run:
    - python >={{ python_min }}
    - python-dateutil >=2.9.0.post0
    - pydantic >=2.0
    - typing_extensions >=4.0.0

test:
  imports:
    - copilot
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/github/copilot-sdk
  summary: Python SDK for GitHub Copilot CLI
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - akrherz
